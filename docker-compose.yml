version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: user-crud-app
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: userdb
      DB_USER: admin
      DB_PASSWORD: admin123
    depends_on:
      postgres-db:
        condition: service_healthy
    

volumes:
  postgres_data:
